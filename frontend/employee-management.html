<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskPilot Enterprise — Employee Management</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

  <div class="app-container" id="app-shell">
    
    <!-- Sidebar Container -->
    <aside class="sidebar" id="sidebar-container"></aside>

    <!-- Main Viewport -->
    <main class="main-viewport">
      
      <!-- Top Navigation -->
      <header class="top-nav" id="navbar-container"></header>

      <!-- Content viewport -->
      <div class="content-area animate-fade-in">
        
        <div class="page-header">
          <div class="page-title">
            <h1>Employee Directory</h1>
            <p>Add employees, edit roles, and reset access passwords.</p>
          </div>
          <div class="page-actions">
            <button class="btn btn-primary btn-sm" onclick="openNewEmployeeModal()"><i class="ti ti-user-plus"></i> Add Employee Account</button>
          </div>
        </div>

        <!-- Directory Grid -->
        <div class="employee-grid" id="admin-employees-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px;">
          <!-- Filled via JS -->
        </div>

      </div>
    </main>
  </div>

  <!-- MODAL: ADMIN CREATE EMPLOYEE -->
  <div class="modal-backdrop" id="employee-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Create Employee Account</h3>
        <button class="close-modal-btn" onclick="closeEmployeeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="employee-form" onsubmit="handleEmployeeFormSubmit(event)">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="emp-form-name" class="form-control" placeholder="e.g. Meena Joseph" required>
          </div>
          <div class="form-group">
            <label>Department</label>
            <select id="emp-form-dept" class="form-control" required>
              <option value="Engineering">Engineering</option>
              <option value="Finance">Finance</option>
              <option value="Design">Design</option>
              <option value="Infrastructure">Infrastructure</option>
              <option value="Security">Security</option>
            </select>
          </div>
          <div class="form-group">
            <label>Job Title / Role</label>
            <input type="text" id="emp-form-role" class="form-control" placeholder="e.g. Lead Designer" required>
          </div>
          <div class="grid-2col" style="gap: 12px; margin-bottom: 0;">
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="emp-form-email" class="form-control" placeholder="email@company.com" required>
              <div id="emp-form-email-error" style="color: var(--color-danger); font-size: 11px; margin-top: 4px; display: none;"></div>
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="text" id="emp-form-phone" class="form-control" placeholder="+1 (555) 0123" required>
            </div>
          </div>
          <div class="form-group">
            <label>Default Access Password</label>
            <input type="password" id="emp-form-password" class="form-control" placeholder="Enter password (default is 123456)" value="123456" required>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeEmployeeModal()">Cancel</button>
        <button type="submit" form="employee-form" class="btn btn-primary">Create Account</button>
      </div>
    </div>
  </div>

  <!-- MODAL: ADMIN PASSWORD RESET -->
  <div class="modal-backdrop" id="reset-password-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Reset Employee Password</h3>
        <button class="close-modal-btn" onclick="closeResetPasswordModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="reset-password-form" onsubmit="handleResetPasswordSubmit(event)">
          <input type="hidden" id="reset-emp-id">
          <div class="form-group">
            <label>Employee Profile</label>
            <input type="text" id="reset-emp-name" class="form-control" disabled>
          </div>
          <div class="form-group">
            <label>New Access Password</label>
            <input type="password" id="reset-emp-password" class="form-control" placeholder="Enter new password" required minlength="4">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeResetPasswordModal()">Cancel</button>
        <button type="submit" form="reset-password-form" class="btn btn-primary">Reset Password</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/employee.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      auth.checkSession(['admin', 'employee']);
      
      const user = auth.getCurrentUser();
      if (user && user.role !== 'admin') {
        const addBtn = document.querySelector('.page-actions button');
        if (addBtn) addBtn.style.display = 'none';
      }
      
      loadEmployeeDirectory();
    });
  </script>
</body>
</html>
