<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskPilot Enterprise — Login Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

  <div class="login-screen">
    <div class="login-card animate-fade-in">
      <div class="login-header">
        <div class="logo-icon" style="margin: 0 auto 12px;">
          <i class="ti ti-activity-heartbeat" style="color: white;"></i>
        </div>
        <h2 style="font-size: 20px; font-weight: 700; color: var(--color-text-main);">TaskPilot Enterprise</h2>
        <p style="font-size: 12px; color: var(--color-text-muted); margin-top: 4px;">Employee Task Monitoring & Metrics</p>
      </div>

      <div class="login-tabs">
        <button class="login-tab-btn active" id="btn-portal-admin" onclick="switchLoginPortal('admin')">Admin Portal</button>
        <button class="login-tab-btn" id="btn-portal-employee" onclick="switchLoginPortal('employee')">Employee Portal</button>
      </div>

      <div class="login-body">
        <form id="login-form" onsubmit="handleLoginSubmit(event)">
          <div class="form-group">
            <label id="login-user-label">Username</label>
            <input type="text" id="login-username" class="form-control" placeholder="Enter username" required autocomplete="username">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">
            Log In Console
          </button>
        </form>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    let activePortal = 'admin';

    // Verify if already logged in
    window.addEventListener('DOMContentLoaded', () => {
      auth.checkSession();
    });

    function switchLoginPortal(portal) {
      activePortal = portal;
      document.getElementById('btn-portal-admin').classList.toggle('active', portal === 'admin');
      document.getElementById('btn-portal-employee').classList.toggle('active', portal === 'employee');
      
      document.getElementById('login-user-label').innerText = portal === 'admin' ? 'Username' : 'Email Address';
      document.getElementById('login-username').placeholder = portal === 'admin' ? 'Enter username' : 'Enter work email';
      document.getElementById('login-form').reset();
    }

    async function handleLoginSubmit(e) {
      e.preventDefault();
      const usernameOrEmail = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;

      if (!validation.isNotEmpty(usernameOrEmail) || !validation.isNotEmpty(password)) {
        showToast('Please enter credentials.', 'danger');
        return;
      }

      await auth.handleLogin(usernameOrEmail, password, activePortal);
    }
  </script>
</body>
</html>
